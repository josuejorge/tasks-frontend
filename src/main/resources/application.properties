server.port=8002

# Atras de proxy reverso (Nginx): usa X-Forwarded-* p/ montar URLs externas corretas
# (sem isso, o redirect_uri do OAuth sairia com host:porta interno do container)
server.forward-headers-strategy=framework

backend.host=${BACKEND_HOST:127.0.0.1}
backend.port=${BACKEND_PORT:8001}
app.version=${APP_VERSION:testing}
app.base-url=${APP_BASE_URL:http://localhost:9999}

## Keycloak OAuth2 Client
## KEYCLOAK_BROWSER_HOST/PORT = endereco que o NAVEGADOR usa para redirecionar ao login
## KEYCLOAK_HOST/PORT         = endereco que o SERVIDOR usa para chamadas internas (token, JWK)
spring.security.oauth2.client.registration.keycloak.client-id=tasks-frontend
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/keycloak

spring.security.oauth2.client.provider.keycloak.authorization-uri=http://${KEYCLOAK_BROWSER_HOST:localhost}:${KEYCLOAK_BROWSER_PORT:8180}/realms/tasks-realm/protocol/openid-connect/auth
spring.security.oauth2.client.provider.keycloak.token-uri=http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8180}/realms/tasks-realm/protocol/openid-connect/token
spring.security.oauth2.client.provider.keycloak.jwk-set-uri=http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8180}/realms/tasks-realm/protocol/openid-connect/certs
spring.security.oauth2.client.provider.keycloak.user-info-uri=http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8180}/realms/tasks-realm/protocol/openid-connect/userinfo
spring.security.oauth2.client.provider.keycloak.user-name-attribute=preferred_username