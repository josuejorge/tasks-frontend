<html>

<head>
	<title>Tasks</title>
	<link rel="stylesheet" href="/tasks/css/bootstrap.min.css">
	<script src="/tasks/js/bootstrap.min.js"></script>
</head>

<body class="bg-light">
	<div class="container w-75">
		<div class="py-5 text-center">
			<h1>Tarefas</h1>
			<p class="lead">A very simple task management tool</p>
			<div class="mt-2">
				<span class="text-muted mr-2"
					th:text="${username} + ', ' + ${role}"
					th:if="${username != null}">
				</span>
				<form th:action="@{/logout}" method="post" class="d-inline">
					<button type="submit" class="btn btn-outline-danger btn-sm">Sair</button>
				</form>
			</div>
		</div>
		<p class="alert alert-success" role="alert" th:if="${success != null}" th:text="${success}" id="message" />
		<p class="alert alert-info" role="alert" th:if="${info != null}" th:text="${info}" />
		<div th:switch="${todos.size()}">
			<h2 th:case="0">Sem Tarefas por hoje... aproveite seu dia!</h2>				
			
			<div th:case="*">
				<table id="todoTable" class="table table-hover">
					<thead class="thead-dark">
						<tr>
							<th>Tarefa</th>
							<th>Data</th>
							<th>Ação</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="todo : ${todos}">
							<td th:text="${todo.task}"></td>
							<td th:text="${todo.dueDate}"></td>
							<td><a class="btn btn-outline-danger btn-sm"
									th:href="@{/delete/{id}(id=${todo.id})}">Remover</a>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
		<a class="btn btn-outline-secondary" role="button" th:href="@{/add}" id="addTodo">Adicionar Tarefa</a>
	</div>
	<footer class="my-5 pt-5 text-muted text-center text-small border-top">
		<p class="mb-1">&copy; 2026. Todos os direitos reservados!</p>
		<p class="mb-1" th:if="${version != null}" th:text="${version}" id="version" />
		<ul class="list-inline">
			<li class="list-inline-item"><a href="https://wcaquino.me" target="blank">Mais</a></li>
		</ul>
	</footer>
</body>

</html>
